<svg viewBox="16 16 88 88" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad2a" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#059669" />
            <stop offset="100%" stop-color="#34d399" />
        </linearGradient>
        <linearGradient id="grad2b" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#0284c7" />
            <stop offset="100%" stop-color="#38bdf8" />
        </linearGradient>
    </defs>
    <!-- Left Pillar (Incoming API Request) -->
    <path d="M 25 90 L 25 45 Q 25 30 40 30 L 50 30" fill="none" stroke="url(#grad2a)" stroke-width="14" stroke-linecap="round" />
    <!-- Right Pillar (Outgoing API Response) -->
    <path d="M 95 90 L 95 45 Q 95 30 80 30 L 70 30" fill="none" stroke="url(#grad2b)" stroke-width="14" stroke-linecap="round" />
    
    <!-- The bridging/mocking element creating the deep 'V' of the 'M' -->
    <path d="M 40 28 L 60 70 L 80 28" fill="none" stroke="#6366f1" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Data connection dots (API Transfer) -->
    <circle cx="25" cy="55" r="3" fill="#ffffff" />
    <circle cx="95" cy="55" r="3" fill="#ffffff" />
</svg>
