    <defs>
        <linearGradient id="grad2a" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#059669"></stop>
            <stop offset="100%" stop-color="#34d399"></stop>
        </linearGradient>
        <linearGradient id="grad2b" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#0284c7"></stop>
